[build]
  base = "project"
  command = "npm run build"
  publish = "dist"

# Rewrites imágenes Supabase
[[redirects]]
  from = "/images/*"
  to = "https://xrtfrtiubugctntwbami.supabase.co/storage/v1/object/public/products/:splat"
  status = 200

[[redirects]]
  from = "/videos/*"
  to = "https://xrtfrtiubugctntwbami.supabase.co/storage/v1/object/public/products/videos/:splat"
  status = 200

# SPA fallback (equivalente a "/(.*)" → "/")
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers (equivalente a vercel headers)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache para assets estáticos del build
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para robots y sitemap
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

# Headers de seguridad y SEO para todas las páginas HTML
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Bloquear indexación de rutas privadas
[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/orders"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cart"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/success"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cancel"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
